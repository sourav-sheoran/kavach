<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>KAVACH — Station OS</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0d1b2a;
      color: #ffffff;
      min-height: 100vh;
      padding-bottom: 100px;
    }

    /* HEADER */
    .top-header {
      background: linear-gradient(135deg, #1a3a5c, #0d1b2a);
      padding: 24px 24px 32px;
    }

    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .back-btn {
      background: rgba(255,255,255,0.08);
      border: none;
      color: #fff;
      width: 40px;
      height: 40px;
      border-radius: 10px;
      font-size: 18px;
      cursor: pointer;
    }

    .header-title {
      font-size: 20px;
      font-weight: 700;
      color: #c9a84c;
    }

    .header-sub {
      font-size: 12px;
      color: #a0b4c8;
      margin-top: 2px;
    }

    /* SEARCH */
    .search-box {
      display: flex;
      gap: 10px;
      align-items: center;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 14px;
      padding: 12px 16px;
      transition: border 0.3s;
    }

    .search-box:focus-within {
      border-color: #c9a84c;
    }

    .search-box input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #fff;
      font-size: 15px;
    }

    .search-box input::placeholder { color: rgba(255,255,255,0.3); }

    .search-icon { font-size: 18px; }

    /* STATION PILLS */
    .station-pills {
      padding: 16px 24px;
      overflow-x: auto;
      scrollbar-width: none;
    }

    .station-pills::-webkit-scrollbar { display: none; }

    .pills-row {
      display: flex;
      gap: 8px;
      width: max-content;
    }

    .station-pill {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 8px 16px;
      font-size: 12px;
      font-weight: 600;
      color: #a0b4c8;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.3s;
    }

    .station-pill.active {
      background: rgba(201,168,76,0.2);
      border-color: #c9a84c;
      color: #c9a84c;
    }

    /* CONTENT */
    .content { padding: 0 24px; }

    /* STATION HERO */
    .station-hero {
      background: linear-gradient(135deg, #1a3a5c, #0d2a45);
      border: 1px solid rgba(201,168,76,0.2);
      border-radius: 20px;
      padding: 24px;
      margin-bottom: 20px;
      position: relative;
      overflow: hidden;
    }

    .station-hero::before {
      content: '📍';
      position: absolute;
      right: -5px;
      bottom: -10px;
      font-size: 80px;
      opacity: 0.08;
    }

    .station-name {
      font-size: 24px;
      font-weight: 800;
      margin-bottom: 4px;
    }

    .station-state {
      font-size: 14px;
      color: #c9a84c;
      margin-bottom: 16px;
    }

    .station-stats {
      display: flex;
      gap: 20px;
    }

    .station-stat {
      text-align: center;
    }

    .station-stat .val {
      font-size: 20px;
      font-weight: 700;
      color: #c9a84c;
    }

    .station-stat .lbl {
      font-size: 10px;
      color: #a0b4c8;
      margin-top: 2px;
    }

    /* TABS */
    .tabs {
      display: flex;
      gap: 0;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 4px;
      margin-bottom: 20px;
    }

    .tab {
      flex: 1;
      padding: 10px;
      border-radius: 10px;
      font-size: 12px;
      font-weight: 600;
      color: #a0b4c8;
      cursor: pointer;
      text-align: center;
      transition: all 0.3s;
      letter-spacing: 0.5px;
    }

    .tab.active {
      background: rgba(201,168,76,0.2);
      color: #c9a84c;
    }

    /* TAB CONTENT */
    .tab-content { display: none; }
    .tab-content.active {
      display: block;
      animation: fadeInUp 0.3s ease;
    }

    /* FACILITY CARDS */
    .facility-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 18px;
      margin-bottom: 12px;
      display: flex;
      gap: 16px;
      align-items: flex-start;
      transition: all 0.3s;
      cursor: pointer;
    }

    .facility-card:hover {
      border-color: rgba(201,168,76,0.3);
      transform: translateY(-1px);
    }

    .facility-icon-wrap {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .type-ECHS { background: rgba(52,152,219,0.2); }
    .type-CSD { background: rgba(155,89,182,0.2); }
    .type-School { background: rgba(46,204,113,0.2); }
    .type-MES { background: rgba(201,168,76,0.2); }
    .type-Other { background: rgba(160,180,200,0.2); }

    .facility-info { flex: 1; }

    .facility-name {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .facility-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 6px;
    }

    .meta-pill {
      font-size: 11px;
      color: #a0b4c8;
      background: rgba(255,255,255,0.05);
      padding: 3px 10px;
      border-radius: 20px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .facility-contact {
      font-size: 12px;
      color: #c9a84c;
    }

    .facility-type-badge {
      font-size: 10px;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 20px;
      letter-spacing: 1px;
      flex-shrink: 0;
    }

    .badge-ECHS { background: rgba(52,152,219,0.2); color: #3498db; }
    .badge-CSD { background: rgba(155,89,182,0.2); color: #9b59b6; }
    .badge-School { background: rgba(46,204,113,0.2); color: #2ecc71; }
    .badge-MES { background: rgba(201,168,76,0.2); color: #c9a84c; }

    /* ACCOMMODATION */
    .accom-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
    }

    .accom-title {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 16px;
      color: #c9a84c;
    }

    .accom-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }

    .accom-stat {
      background: rgba(255,255,255,0.04);
      border-radius: 12px;
      padding: 16px;
      text-align: center;
    }

    .accom-stat .num {
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 4px;
    }

    .accom-stat .num.red { color: #e74c3c; }
    .accom-stat .num.green { color: #2ecc71; }

    .accom-stat .lbl {
      font-size: 11px;
      color: #a0b4c8;
    }

    /* COMMUNITY */
    .community-post {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 10px;
    }

    .post-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .post-avatar {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, #1a3a5c, #c9a84c);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    .post-name {
      font-size: 13px;
      font-weight: 600;
    }

    .post-time {
      font-size: 11px;
      color: #a0b4c8;
    }

    .post-text {
      font-size: 13px;
      color: #a0b4c8;
      line-height: 1.6;
    }

    /* NEW POST */
    .new-post-card {
      background: rgba(201,168,76,0.06);
      border: 1px solid rgba(201,168,76,0.2);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 16px;
    }

    .new-post-card textarea {
      width: 100%;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      color: #fff;
      font-size: 14px;
      padding: 12px;
      outline: none;
      resize: none;
      font-family: inherit;
      margin-bottom: 10px;
    }

    .new-post-card textarea::placeholder {
      color: rgba(255,255,255,0.3);
    }

    /* POSTING CHECKLIST */
    .checklist-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
    }

    .checklist-title {
      font-size: 14px;
      font-weight: 700;
      color: #c9a84c;
      margin-bottom: 16px;
    }

    .checklist-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      cursor: pointer;
    }

    .checklist-item:last-child { border-bottom: none; }

    .check-box {
      width: 22px;
      height: 22px;
      border-radius: 6px;
      border: 2px solid rgba(255,255,255,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      flex-shrink: 0;
      transition: all 0.3s;
    }

    .check-box.checked {
      background: #2ecc71;
      border-color: #2ecc71;
    }

    .check-text {
      font-size: 13px;
      color: #a0b4c8;
      flex: 1;
    }

    .check-text.done {
      text-decoration: line-through;
      color: rgba(160,180,200,0.5);
    }

    /* BTN */
    .btn-primary {
      background: linear-gradient(135deg, #c9a84c, #f0d080);
      color: #0d1b2a;
      border: none;
      padding: 14px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
      transition: all 0.3s;
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(201,168,76,0.3);
    }

    /* BOTTOM NAV */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(13,27,42,0.95);
      border-top: 1px solid rgba(255,255,255,0.08);
      display: flex;
      padding: 12px 0 16px;
      backdrop-filter: blur(10px);
      z-index: 100;
    }

    .nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      text-decoration: none;
      color: #a0b4c8;
      transition: color 0.3s;
    }

    .nav-item.active { color: #c9a84c; }
    .nav-icon { font-size: 22px; }
    .nav-label { font-size: 10px; font-weight: 600; }

    .loading-state {
      text-align: center;
      padding: 40px;
      color: #a0b4c8;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(201,168,76,0.2);
      border-top-color: #c9a84c;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <div class="top-header">
    <div class="header-top">
      <button class="back-btn" onclick="history.back()">←</button>
      <div>
        <div class="header-title">📍 Station OS</div>
        <div class="header-sub">Your Station — Your Guide</div>
      </div>
      <div style="width:40px"></div>
    </div>

    <!-- SEARCH -->
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input
        type="text"
        id="searchInput"
        placeholder="Search station... (e.g. Pune, Delhi)"
        oninput="searchStation(this.value)"
      />
    </div>
  </div>

  <!-- STATION PILLS -->
  <div class="station-pills">
    <div class="pills-row" id="stationPills">
      <div class="station-pill active" onclick="loadStation('Pune Cantonment', this)">
        📍 Pune
      </div>
      <div class="station-pill" onclick="loadStation('Delhi Cantonment', this)">
        📍 Delhi
      </div>
      <div class="station-pill" onclick="loadStation('Ambala Cantonment', this)">
        📍 Ambala
      </div>
      <div class="station-pill" onclick="loadStation('Jaipur Cantonment', this)">
        📍 Jaipur
      </div>
      <div class="station-pill" onclick="loadStation('Hisar Cantonment', this)">
        📍 Hisar
      </div>
    </div>
  </div>

  <!-- CONTENT -->
  <div class="content">

    <div id="stationContent">
      <div class="loading-state">
        <div class="spinner"></div>
        Loading station data...
      </div>
    </div>

  </div>

  <!-- BOTTOM NAV -->
  <div class="bottom-nav">
    <a href="/dashboard.html" class="nav-item">
      <div class="nav-icon">🏠</div>
      <div class="nav-label">Home</div>
    </a>
    <a href="/inbox.html" class="nav-item">
      <div class="nav-icon">📬</div>
      <div class="nav-label">Inbox</div>
    </a>
    <a href="/card.html" class="nav-item">
      <div class="nav-icon">🪪</div>
      <div class="nav-label">My Card</div>
    </a>
    <a href="/station.html" class="nav-item active">
      <div class="nav-icon">📍</div>
      <div class="nav-label">Station</div>
    </a>
  </div>

<script>
  const token = localStorage.getItem('kavachToken');
  if (!token) window.location.href = '/login.html';

  let currentStation = null;
  const checklist = [
    'ECHS hospital registration',
    'CSD membership transfer',
    'School TC submission',
    'Accommodation request submit',
    'Update station in KAVACH',
    'Local transport familiarization',
    'Emergency contacts note karo'
  ];

  const facilityIcons = {
    ECHS: '🏥',
    CSD: '🛒',
    School: '🏫',
    MES: '🏠',
    Other: '📌'
  };

  function switchTab(tabName) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c =>
      c.classList.remove('active'));
    document.getElementById(`tab-${tabName}`).classList.add('active');
    document.getElementById(`content-${tabName}`).classList.add('active');
  }

  function renderStation(station) {
    currentStation = station;

    const facilitiesHTML = station.facilities.map(f => `
      <div class="facility-card">
        <div class="facility-icon-wrap type-${f.type}">
          ${facilityIcons[f.type] || '📌'}
        </div>
        <div class="facility-info">
          <div class="facility-name">${f.name}</div>
          <div class="facility-meta">
            <span class="meta-pill">📍 ${f.distance}</span>
            <span class="meta-pill">🕐 ${f.timing}</span>
          </div>
          <div class="facility-contact">📞 ${f.contact}</div>
        </div>
        <span class="facility-type-badge badge-${f.type}">${f.type}</span>
      </div>
    `).join('');

    const checklistHTML = checklist.map((item, i) => `
      <div class="checklist-item" onclick="toggleCheck(${i}, this)">
        <div class="check-box" id="check-${i}"></div>
        <span class="check-text" id="checktext-${i}">${item}</span>
      </div>
    `).join('');

    const communityHTML = station.community && station.community.length > 0
      ? station.community.map(post => `
          <div class="community-post">
            <div class="post-header">
              <div class="post-avatar">👤</div>
              <div>
                <div class="post-name">Army Family</div>
                <div class="post-time">${new Date(post.createdAt).toLocaleDateString('en-IN')}</div>
              </div>
            </div>
            <div class="post-text">${post.post}</div>
          </div>
        `).join('')
      : `<div class="community-post">
          <div class="post-header">
            <div class="post-avatar">💬</div>
            <div>
              <div class="post-name">KAVACH Community</div>
              <div class="post-time">Welcome</div>
            </div>
          </div>
          <div class="post-text">
            Is station ke baare mein pehli post aap karo! 
            Apne experience share karo baaki families ke saath. 🙏
          </div>
        </div>`;

    document.getElementById('stationContent').innerHTML = `
      <!-- STATION HERO -->
      <div class="station-hero">
        <div class="station-name">${station.name}</div>
        <div class="station-state">📍 ${station.state}</div>
        <div class="station-stats">
          <div class="station-stat">
            <div class="val">${station.facilities.length}</div>
            <div class="lbl">Facilities</div>
          </div>
          <div class="station-stat">
            <div class="val">${station.accommodation?.available || 0}</div>
            <div class="lbl">Available Qtrs</div>
          </div>
          <div class="station-stat">
            <div class="val">${station.accommodation?.waitlist || 0}</div>
            <div class="lbl">Waitlist</div>
          </div>
        </div>
      </div>

      <!-- TABS -->
      <div class="tabs">
        <div class="tab active" id="tab-facilities"
          onclick="switchTab('facilities')">🏥 Facilities</div>
        <div class="tab" id="tab-accommodation"
          onclick="switchTab('accommodation')">🏠 Housing</div>
        <div class="tab" id="tab-community"
          onclick="switchTab('community')">👥 Community</div>
        <div class="tab" id="tab-guide"
          onclick="switchTab('guide')">📋 Guide</div>
      </div>

      <!-- FACILITIES TAB -->
      <div class="tab-content active" id="content-facilities">
        ${facilitiesHTML}
      </div>

      <!-- ACCOMMODATION TAB -->
      <div class="tab-content" id="content-accommodation">
        <div class="accom-card">
          <div class="accom-title">🏠 MES Accommodation Status</div>
          <div class="accom-stats">
            <div class="accom-stat">
              <div class="num green">${station.accommodation?.available || 0}</div>
              <div class="lbl">Available Now</div>
            </div>
            <div class="accom-stat">
              <div class="num red">${station.accommodation?.waitlist || 0}</div>
              <div class="lbl">Waitlist</div>
            </div>
          </div>
          <button class="btn-primary">📝 Apply for Accommodation</button>
        </div>
        <div class="accom-card">
          <div class="accom-title">ℹ️ Important Info</div>
          <div style="font-size:13px;color:#a0b4c8;line-height:1.8">
            ✅ Service certificate required<br/>
            ✅ Application form MES office se milega<br/>
            ✅ Processing time: 2-4 weeks<br/>
            ✅ Allotment rank + seniority basis pe hota hai
          </div>
        </div>
      </div>

      <!-- COMMUNITY TAB -->
      <div class="tab-content" id="content-community">
        <div class="new-post-card">
          <textarea
            id="communityPost"
            rows="3"
            placeholder="Is station ke baare mein kuch share karo... school, transport, markets, tips 🙏"
          ></textarea>
          <button class="btn-primary" onclick="submitPost()">
            📤 Share with Community
          </button>
        </div>
        ${communityHTML}
      </div>

      <!-- GUIDE TAB -->
      <div class="tab-content" id="content-guide">
        <div class="checklist-card">
          <div class="checklist-title">
            📋 New Posting Checklist — ${station.name}
          </div>
          ${checklistHTML}
        </div>
        <div class="accom-card">
          <div class="accom-title">💡 Pro Tips</div>
          <div style="font-size:13px;color:#a0b4c8;line-height:1.9">
            🔹 ECHS card pehle update karo — hospitals verify karte hain<br/>
            🔹 CSD membership transfer online ho sakti hai<br/>
            🔹 School TC 30 din ke andar submit karna hota hai<br/>
            🔹 Local bazaar ke baare mein community se poocho<br/>
            🔹 Emergency contacts save kar lo pehle din
          </div>
        </div>
      </div>
    `;
  }

  function toggleCheck(i, el) {
    const box = document.getElementById(`check-${i}`);
    const text = document.getElementById(`checktext-${i}`);
    box.classList.toggle('checked');
    box.textContent = box.classList.contains('checked') ? '✓' : '';
    text.classList.toggle('done');
  }

  async function loadStation(name, pillEl) {
    // Update pills
    if (pillEl) {
      document.querySelectorAll('.station-pill').forEach(p =>
        p.classList.remove('active'));
      pillEl.classList.add('active');
    }

    document.getElementById('stationContent').innerHTML = `
      <div class="loading-state">
        <div class="spinner"></div>
        Loading ${name}...
      </div>`;

    try {
      const res = await fetch(`/api/station/${encodeURIComponent(name)}`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      const data = await res.json();

      if (data.success) {
        renderStation(data.data);
      } else {
        document.getElementById('stationContent').innerHTML = `
          <div class="loading-state">
            <div style="font-size:48px;margin-bottom:16px">😕</div>
            Station not found
          </div>`;
      }
    } catch (err) {
      document.getElementById('stationContent').innerHTML = `
        <div class="loading-state">⚠️ Could not load station data</div>`;
    }
  }

  let searchTimeout;
  function searchStation(query) {
    clearTimeout(searchTimeout);
    if (!query.trim()) return;
    searchTimeout = setTimeout(() => {
      loadStation(query.trim(), null);
    }, 600);
  }

  async function submitPost() {
    const post = document.getElementById('communityPost').value.trim();
    if (!post) return;

    try {
      const res = await fetch('/api/station/community/post', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token}`
        },
        body: JSON.stringify({
          stationName: currentStation.name,
          post
        })
      });

      const data = await res.json();
      if (data.success) {
        document.getElementById('communityPost').value = '';
        loadStation(currentStation.name, null);
        alert('✅ Post shared successfully!');
      }
    } catch (err) {
      alert('❌ Could not post. Try again.');
    }
  }

  // Load default station
  loadStation('Pune Cantonment', null);
</script>

</body>
</html>
